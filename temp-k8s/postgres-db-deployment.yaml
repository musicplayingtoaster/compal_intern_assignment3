apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f - -o ./temp-k8s
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: postgres-db
  name: postgres-db
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: postgres-db
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f - -o ./temp-k8s
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: postgres-db
    spec:
      containers:
        - args:
            - postgres
            - -c
            - log_statement=all
            - -c
            - log_connections=on
            - -c
            - log_disconnections=on
            - -c
            - log_duration=on
          env:
            - name: POSTGRES_DB
              value: todo-list-db
            - name: POSTGRES_PASSWORD
              value: todo!compal123
            - name: POSTGRES_USER
              value: db-user
          image: postgres:17-alpine
          livenessProbe:
            exec:
              command:
                - pg_isready -U db-user -d todo-list-db
            failureThreshold: 5
            periodSeconds: 10
            timeoutSeconds: 5
          name: postgres-db
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: pgdata
            - mountPath: /docker-entrypoint-initdb.d
              name: postgres-db-cm1
      restartPolicy: Always
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: pgdata
        - configMap:
            name: postgres-db-cm1
          name: postgres-db-cm1
