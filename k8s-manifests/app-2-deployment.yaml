apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml -o ./k8s-manifests
    kompose.image-pull-policy: Never
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: app-2
  name: app-2
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: app-2
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml -o ./k8s-manifests
        kompose.image-pull-policy: Never
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: app-2
    spec:
      containers:
        - env:
            - name: UV_HTTP_TIMEOUT
              value: "60"
          envFrom:
            - configMapRef:
                name: env-client-init-env
          image: docker.io/library/compal_intern_assignment3-app-2:latest
          imagePullPolicy: Never
          livenessProbe:
            httpGet:
              path: /heatlh
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 5
          name: app-2
          ports:
            - containerPort: 8000
              protocol: TCP
      restartPolicy: Always
