apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml -o ./k8s-manifests
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: app-2
  name: app-2
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: app-2
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml -o ./k8s-manifests
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: app-2
    spec:
      containers:
        - env:
            - name: UV_HTTP_TIMEOUT
              value: "60"
          envFrom:
            - configMapRef:
                name: env-client-init-env
          image: app-2
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 5
          name: app-2
          ports:
            - containerPort: 8000
              protocol: TCP
      restartPolicy: Always
