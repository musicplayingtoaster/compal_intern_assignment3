apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml -o ./k8s-manifests
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: nginx-proxy
  name: nginx-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: nginx-proxy
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml -o ./k8s-manifests
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: nginx-proxy
    spec:
      containers:
        - image: nginx:latest
          name: nginx-proxy
          ports:
            - containerPort: 3000
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/nginx/nginx.conf
              name: nginx-proxy-cm0
              readOnly: true
              subPath: nginx.conf
            - mountPath: /usr/share/nginx/html
              name: nginx-proxy-cm1
              readOnly: true
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: nginx.conf
                path: nginx.conf
            name: nginx-proxy-cm0
          name: nginx-proxy-cm0
        - configMap:
            name: nginx-proxy-cm1
          name: nginx-proxy-cm1
