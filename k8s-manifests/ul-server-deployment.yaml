apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml -o ./k8s-manifests
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: ul-server
  name: ul-server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ul-server
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml -o ./k8s-manifests
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: ul-server
    spec:
      containers:
        - args:
            - uv
            - run
            - update_listener
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - configMapRef:
                name: env-client-init-env
          image: ul-server
          name: update-listener
          ports:
            - containerPort: 8000
              protocol: TCP
      restartPolicy: Always
