apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml -o ./k8s-manifests
    kompose.image-pull-policy: Never
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: websocket-server
  name: websocket-server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: websocket-server
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml -o ./k8s-manifests
        kompose.image-pull-policy: Never
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: websocket-server
    spec:
      containers:
        - env:
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - configMapRef:
                name: env-client-init-env
          image: docker.io/library/compal_intern_assignment3-websocket-server:latest
          imagePullPolicy: Never
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - import socket; s = socket.socket(); s.connect(('localhost', 8765))
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 5
          name: websocket-server
          ports:
            - containerPort: 8765
              protocol: TCP
      restartPolicy: Always
