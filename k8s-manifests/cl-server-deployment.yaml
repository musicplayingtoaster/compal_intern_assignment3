apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml -o ./k8s-manifests
    kompose.image-pull-policy: Never
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: cl-server
  name: cl-server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: cl-server
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml -o ./k8s-manifests
        kompose.image-pull-policy: Never
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: cl-server
    spec:
      containers:
        - args:
            - uv
            - run
            - create_listener
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - configMapRef:
                name: env-client-init-env
          image: docker.io/library/compal_intern_assignment3-cl-server:latest
          imagePullPolicy: Never
          name: create-listener
          ports:
            - containerPort: 8000
              protocol: TCP
      restartPolicy: Always
