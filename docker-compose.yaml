services:
  nginx-proxy:
    build:
      context: .
      dockerfile: ngx.Dockerfile
    image: docker.io/library/compal_intern_assignment3-nginx-proxy:latest
    labels:
      kompose.image-pull-policy: Never
      kompose.service.type: nodeport
    container_name: nginx-proxy
    ports:
      - "3000"
    networks:
      - todo-app-network
    depends_on:
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy
      websocket-server:
        condition: service_healthy


  app-1:
    build:
      context: .
      dockerfile: api.Dockerfile
    image: docker.io/library/compal_intern_assignment3-app-1:latest
    labels:
      kompose.image-pull-policy: Never
    container_name: app-1
    env_file:
      - path: ./.env/client-init.env
        required: true
    environment:
      - UV_HTTP_TIMEOUT=60
    ports:
      - "8000"
    networks:
      - todo-app-network
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  app-2:
    build: 
      context: .
      dockerfile: api.Dockerfile
    image: docker.io/library/compal_intern_assignment3-app-2:latest
    labels:
      kompose.image-pull-policy: Never
    container_name: app-2
    env_file:
      - path: ./.env/client-init.env
        required: true
    environment:
      - UV_HTTP_TIMEOUT=60
    ports:
      - "8000"
    networks:
      - todo-app-network
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy


  postgres-db:
    image: postgres:17-alpine
    container_name: postgres-db
    restart: always
    env_file:
      - path: ./.env/pgdb-init.env
        required: true
    ports:
      - "5432"
    networks:
      - todo-app-network
    volumes:
      - pgdata:/var/lib/postgresql/data
      - type: bind
        source: ./init-db/
        target: /docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U db-user -d todo-list-db"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: [
      "postgres",
      "-c", "log_statement=all",
      "-c", "log_connections=on",
      "-c", "log_disconnections=on",
      "-c", "log_duration=on",
    ]


  redis-cache:
    image: redis:alpine3.23
    container_name: redis-cache
    restart: always
    ports:
      - "6379"
    networks:
      - todo-app-network
    volumes:
      - rdcdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s


  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq
    restart: always
    ports:
      - "5672"
    networks:
      - todo-app-network
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 3


  cl-server:
    build:
      context: .
      dockerfile: ls.Dockerfile
    image: docker.io/library/compal_intern_assignment3-cl-server:latest
    labels:
      kompose.image-pull-policy: Never
    container_name: create-listener
    env_file:
      - path: ./.env/client-init.env
        required: true
    environment:
      - PYTHONUNBUFFERED=1
    command: ["uv", "run", "create_listener"]
    ports:
      - "8000"
    networks:
      - todo-app-network
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ll-server:
    build:
      context: .
      dockerfile: ls.Dockerfile
    image: docker.io/library/compal_intern_assignment3-ll-server:latest
    labels:
      kompose.image-pull-policy: Never
    container_name: load-listener
    env_file:
      - path: ./.env/client-init.env
        required: true
    environment:
      - PYTHONUNBUFFERED=1
    command: ["uv", "run", "load_listener"]
    ports:
      - "8000"
    networks:
      - todo-app-network
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ul-server:
    build:
      context: .
      dockerfile: ls.Dockerfile
    image: docker.io/library/compal_intern_assignment3-ul-server:latest
    labels:
      kompose.image-pull-policy: Never
    container_name: update-listener
    env_file:
      - path: ./.env/client-init.env
        required: true
    environment:
      - PYTHONUNBUFFERED=1
    command: ["uv", "run", "update_listener"]
    ports:
      - "8000"
    networks:
      - todo-app-network
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  dl-server:
    build:
      context: .
      dockerfile: ls.Dockerfile
    image: docker.io/library/ompal_intern_assignment3-dl-server:latest
    labels:
      kompose.image-pull-policy: Never
    container_name: delete-listener
    env_file:
      - path: ./.env/client-init.env
        required: true
    environment:
      - PYTHONUNBUFFERED=1
    command: ["uv", "run", "delete_listener"]
    ports:
      - "8000"
    networks:
      - todo-app-network
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  websocket-server:
    build:
      context: .
      dockerfile: ws.Dockerfile
    image: docker.io/library/compal_intern_assignment3-websocket-server:latest
    labels:
      kompose.image-pull-policy: Never
    container_name: websocket-server
    env_file:
      - path: ./.env/client-init.env
        required: true
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8765"
    networks:
      - todo-app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('localhost', 8765))"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      rabbitmq:
        condition: service_healthy


networks:
  todo-app-network:
    driver: bridge

volumes:
  pgdata:
  rdcdata:
  rabbitmq_data:
  rabbitmq_logs:
